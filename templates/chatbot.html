{% extends "base.html" %}

{% block content %}

<h1 class="page-title">🤖 Chatbot IA Mundial 2026</h1>

<div class="chat-container">

    <div class="chat-header">
        Asistente Inteligente FIFA World Cup 2026
    </div>

    <div id="chat" class="chat-messages">

        <div class="bot-message">
            <strong>IA:</strong>
            Hola 👋. Soy el asistente del Predictor Mundial 2026.
        </div>

    </div>

    <!-- INPUT REAL TIME -->
    <div class="chat-input-area">

        <input type="text" id="pregunta" placeholder="Escribe tu pregunta..." required>

        <button onclick="enviarMensaje()">
            Enviar
        </button>

        <button onclick="nuevoChat()">🆕 Nuevo chat</button>

    </div>

</div>

<!-- JAVASCRIPT -->
<script>
async function enviarMensaje() {

    let input = document.getElementById("pregunta");
    let mensaje = input.value;

    if (mensaje.trim() === "") return;

    let chat = document.querySelector(".chat-messages");

    // mensaje usuario
    let userDiv = document.createElement("div");
    userDiv.className = "user-message";
    userDiv.innerHTML = "<strong>Tú:</strong> " + mensaje;
    chat.appendChild(userDiv);

    input.value = "";

    // backend
    let response = await fetch("/api/chatbot", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pregunta: mensaje })
    });

    let data = await response.json();

    // respuesta bot
    let botDiv = document.createElement("div");
    botDiv.className = "bot-message";
    botDiv.innerHTML = "<strong>IA:</strong> " + data.respuesta;
    chat.appendChild(botDiv);

    // scroll automático
    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("pregunta").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        enviarMensaje();
    }
});

</script>

<script>

let historial = JSON.parse(localStorage.getItem("chat_historial")) || [];

function renderHistorial() {
    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    if (historial.length === 0) {
        chat.innerHTML = `
            <div class="bot-message">
                <strong>IA:</strong> Hola 👋. Soy el asistente del Mundial 2026.
            </div>
        `;
        return;
    }

    historial.forEach(msg => {
        let div = document.createElement("div");

        if (msg.tipo === "usuario") {
            div.className = "user-message";
            div.innerHTML = "<strong>Tú:</strong> " + msg.mensaje;
        } else {
            div.className = "bot-message";
            div.innerHTML = "<strong>IA:</strong> " + msg.mensaje;
        }

        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

async function enviarMensaje() {

    let input = document.getElementById("pregunta");
    let mensaje = input.value;

    if (mensaje.trim() === "") return;

    historial.push({ tipo: "usuario", mensaje: mensaje });
    renderHistorial();

    input.value = "";

    let response = await fetch("/api/chatbot", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pregunta: mensaje })
    });

    let data = await response.json();

    historial.push({ tipo: "bot", mensaje: data.respuesta });

    localStorage.setItem("chat_historial", JSON.stringify(historial));

    renderHistorial();
}

function nuevoChat() {
    historial = [];
    localStorage.removeItem("chat_historial");
    renderHistorial();
}

// ENTER
document.getElementById("pregunta").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        enviarMensaje();
    }
});

// cargar chat al iniciar
renderHistorial();

</script>

{% endblock %}
